<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KRAKE Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/favicon.png" alt="KRAKE icon" class="brand-icon">
      <span>Settings</span>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>WiFi Connection</h1>
      <p class="subtitle">Clear saved WiFi and reconnect KRAKE to a different network.</p>
      <button class="action-btn danger" onclick="resetWifi()">Reset WiFi & Reconnect</button>
    </section>

    <section class="card">
      <h1>Sound</h1>
      <p class="subtitle">Mute or unmute KRAKE alarm audio remotely.</p>
      <div class="button-row">
        <button class="action-btn" onclick="setMuted(true)">Mute</button>
        <button class="action-btn secondary" onclick="setMuted(false)">Unmute</button>
      </div>
      <div class="status-row">Current status: <strong id="muteStatus">-</strong></div>
    </section>

    <section class="card">
      <h1>MQTT</h1>
      <p class="subtitle">Edit broker and set extra topics to subscribe (comma-separated).</p>

      <label for="broker">Broker</label>
      <input id="broker" class="text-input" placeholder="broker.hivemq.com" />
      <button class="action-btn" onclick="saveBroker()">Save Broker</button>

      <label for="topics" style="margin-top:12px; display:block;">Extra Subscribe Topics</label>
      <textarea id="topics" class="text-input" rows="3" placeholder="topic1,topic2"></textarea>
      <button class="action-btn" onclick="saveTopics()">Save Topics</button>

      <div class="status-row">Primary alarm topic: <code id="alarmTopic">-</code></div>
      <div class="status-row">Ack topic: <code id="ackTopic">-</code></div>
    </section>
  </main>

  <footer class="footer">
    <a class="footer-btn" href="/">Back to Dashboard</a>
    <div id="message" class="note"></div>
  </footer>

  <script>
    function showMessage(msg, isError = false) {
      const node = document.getElementById('message');
      node.textContent = msg;
      node.style.color = isError ? '#b00020' : '#146620';
    }

    async function postForm(url, bodyObj) {
      const body = new URLSearchParams(bodyObj);
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body
      });
      if (!res.ok) {
        throw new Error(await res.text());
      }
      return await res.text();
    }

    async function refreshSettings() {
      const res = await fetch('/settings-data');
      if (!res.ok) throw new Error('Unable to load settings');
      const data = await res.json();
      document.getElementById('broker').value = data.broker || '';
      document.getElementById('topics').value = data.extraTopics || '';
      document.getElementById('muteStatus').textContent = data.muted ? 'Muted' : 'Unmuted';
      document.getElementById('alarmTopic').textContent = data.alarmTopic || '-';
      document.getElementById('ackTopic').textContent = data.ackTopic || '-';
    }

    async function resetWifi() {
      if (!confirm('This will clear WiFi credentials and restart KRAKE. Continue?')) return;
      try {
        await postForm('/settings/wifi/reset', {});
        showMessage('WiFi reset started. Device will restart shortly.');
      } catch (e) {
        showMessage('WiFi reset failed: ' + e.message, true);
      }
    }

    async function setMuted(muted) {
      try {
        await postForm('/settings/mute', { muted: muted ? '1' : '0' });
        showMessage(muted ? 'Krake muted.' : 'Krake unmuted.');
        await refreshSettings();
      } catch (e) {
        showMessage('Failed to update mute status: ' + e.message, true);
      }
    }

    async function saveBroker() {
      try {
        const broker = document.getElementById('broker').value.trim();
        await postForm('/settings/broker', { broker });
        showMessage('Broker updated and MQTT reconnected.');
      } catch (e) {
        showMessage('Failed to save broker: ' + e.message, true);
      }
    }

    async function saveTopics() {
      try {
        const topics = document.getElementById('topics').value;
        await postForm('/settings/topics', { topics });
        showMessage('Topics updated and MQTT reconnected.');
        await refreshSettings();
      } catch (e) {
        showMessage('Failed to save topics: ' + e.message, true);
      }
    }

    refreshSettings().catch(e => showMessage(e.message, true));
    setInterval(() => refreshSettings().catch(() => {}), 2000);
  </script>
</body>
</html>
