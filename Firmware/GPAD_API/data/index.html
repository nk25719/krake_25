<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soft KRAKE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header id="appHeader"></header>

  <nav id="sideMenu"></nav>

  <main class="container">
    <section class="card">
      <h1>KRAKE </h1>
      <p class="subtitle">A Public Invention device</p>

      <div class="info-row"><span class="label">Serial:</span><span id="serial" class="value">GPAP over serial/MQTT</span></div>
      <div class="info-row"><span class="label">URL:</span><span id="deviceUrl" class="value">device local address</span></div>
      <div class="info-row"><span class="label">IP:</span><span id="ip" class="value">shown on LCD/serial</span></div>
      <div class="info-row"><span class="label">MAC:</span><span id="mac" class="value">shown on LCD/serial</span></div>
      <div class="info-row"><span class="label">WiFi RSSI:</span><span id="rssi" class="value">shown on serial</span></div>
      <div class="info-row"><span class="label">Uptime:</span><span id="uptime" class="value">shown on serial</span></div>
      <div class="info-row"><span class="label">MQTT:</span><span id="mqtt" class="value">GPAP alarm topic</span></div>
      <div class="info-row"><span class="label">Firmware:</span><span id="firmware" class="value">firmware build</span></div>
      <div class="info-row"><span class="label">Compiled:</span><span id="compiled" class="value">compile time</span></div>
        <!-- <div class="qr-box">
        <img src="%QR%" alt="QR Code">
      </div> -->
    </section>

    <section class="card">
      <div class="lcd-title">Live LCD Output</div>
      <div class="lcd-frame">
        <div class="lcd-screen">
          <div id="lcd0" class="lcd-line"></div>
          <div id="lcd1" class="lcd-line"></div>
          <div id="lcd2" class="lcd-line"></div>
          <div id="lcd3" class="lcd-line"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <a href="https://pubinv.org" target="_blank">pubinv.org</a>
  </footer>

  <script src="/js/common.js"></script>
  <script>
    KrakeUI.mountLayout('Public Invention');
    // GPAP-only firmware: live protocol state is reported over serial/MQTT,
    // not browser polling.
  </script>

</body>
</html>
