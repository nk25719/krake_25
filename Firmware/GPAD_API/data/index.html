<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soft KRAKE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img src="/favicon.png" alt="KRAKE icon" class="brand-icon">
      <span>KRAKE</span>
    </div>

    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">☰</button>
  </header>

  <nav id="sideMenu" class="side-menu">
    <a href="/update">Update Firmware</a>
    <a href="/GDT_TrackHistory.html">GDT Track Record</a>
    <a href="/Electrical_testHistory.html">Electrical Test History</a>
    <a href="/monitor">Factory Test / Developer Monitor</a>
    <a href="/manual">User Manual</a>
    <a href="/settings">Settings</a>
  </nav>

  <main class="container">
    <section class="card">
      <h1>KRAKE </h1>
      <p class="subtitle">A Public Invention device</p>

      <div class="info-row"><label class="label" for="serial">Serial:</label> <input id="serial" class="text-input inline-input" value="%SERIAL%" /></div>
      <div class="info-row"><label class="label" for="deviceUrl">URL:</label> <input id="deviceUrl" class="text-input inline-input" value="%URL%" /></div>
      <div class="info-row"><label class="label" for="ip">IP:</label> <input id="ip" class="text-input inline-input" value="%IP%" /></div>
      <div class="info-row"><label class="label" for="mac">MAC:</label> <input id="mac" class="text-input inline-input" value="%MAC%" /></div>
      <div class="info-row"><label class="label" for="rssi">WiFi RSSI:</label> <input id="rssi" class="text-input inline-input" value="%RSSI%" /></div>
      <div class="info-row"><label class="label" for="uptime">Uptime:</label> <input id="uptime" class="text-input inline-input" value="%UPTIME%" /></div>
      <div class="info-row"><label class="label" for="mqtt">MQTT:</label> <input id="mqtt" class="text-input inline-input" value="%MQTT%" /></div>

      <div class="qr-box">
        <img src="%QR%" alt="QR Code">
      </div>
    </section>

    <section class="card">
      <div class="lcd-title">Live LCD Output</div>
      <div class="lcd-frame">
        <div class="lcd-screen">
          <div id="lcd0" class="lcd-line"></div>
          <div id="lcd1" class="lcd-line"></div>
          <div id="lcd2" class="lcd-line"></div>
          <div id="lcd3" class="lcd-line"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <a href="https://pubinv.org" target="_blank">pubinv.org</a>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById("sideMenu").classList.toggle("open");
    }

    function pad20(str) {
      if (!str) return "                    ";
      return (str + "                    ").substring(0, 20);
    }

    function updateLCD(lines) {
      for (let i = 0; i < 4; i++) {
        document.getElementById("lcd" + i).textContent = pad20(lines[i]);
      }
    }

    async function fetchLCD() {
      try {
        const res = await fetch("/lcd");
        if (!res.ok) return;
        const data = await res.json();
        if (data.lines) updateLCD(data.lines);
      } catch (e) {
        console.log("LCD fetch failed");
      }
    }

    async function fetchStatus() {
      try {
        const res = await fetch("/status");
        if (!res.ok) return;
        const data = await res.json();

        document.getElementById("ip").value = data.ip || "-";
        document.getElementById("mac").value = data.mac || "-";
        document.getElementById("rssi").value = data.rssi || "-";
        document.getElementById("uptime").value = data.uptime || "-";
        document.getElementById("mqtt").value = data.mqtt || "-";
        document.getElementById("deviceUrl").value = data.url || "-";
      } catch (e) {
        console.log("Status fetch failed");
      }
    }

    fetchLCD();
    fetchStatus();

    setInterval(fetchLCD, 1000);
    setInterval(fetchStatus, 2000);
  </script>

</body>
</html>
